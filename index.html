<!DOCTYPE HTML>
<html>
<head>
    <title>German Tcakulov</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>

<!-- Banner (Hero) with background image, no name, no buttons -->
<section id="banner" style="background-image: url('assets/images/hero.jpg'); background-size: cover; background-position: center; height: 100vh; border: none;">
</section>

<!-- Three Tiles Below Hero -->
<section id="tiles" class="wrapper style1">
    <div class="inner">
        <div class="grid-style">
            <section>
                <span class="image fit"><img src="assets/images/event1.jpg" alt="Concert" /></span>
                <h3>Concert</h3>
                <p>Datum · Ort · Info</p>
            </section>
            <section>
                <span class="image fit"><img src="assets/images/event2.jpg" alt="Masterclass" /></span>
                <h3>Masterclass</h3>
                <p>Datum · Ort · Info</p>
            </section>
            <section>
                <span class="image fit"><img src="assets/images/event3.jpg" alt="Jury" /></span>
                <h3>Jury</h3>
                <p>Datum · Ort · Info</p>
            </section>
        </div>
    </div>
</section>

<script src="assets/js/main.js"></script>
</body>
</html>
